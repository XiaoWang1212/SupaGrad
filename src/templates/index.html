<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupaGrad 手動學分審查</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f7f8fa;
        color: #1f2937;
      }
      .container {
        max-width: 860px;
        margin: 36px auto;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: 1fr 1fr;
      }
      .full {
        grid-column: 1 / -1;
      }
      label {
        display: block;
        font-size: 0.92rem;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 90px;
      }
      button {
        margin-top: 12px;
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }
      .hint {
        color: #6b7280;
        font-size: 0.9rem;
      }
      .result {
        margin-top: 20px;
        padding: 14px;
        border-radius: 10px;
        background: #f3f4f6;
      }
      .ok {
        border-left: 5px solid #16a34a;
      }
      .no {
        border-left: 5px solid #dc2626;
      }
      pre {
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>SupaGrad 手動學分審查</h1>

      <form id="auditForm" enctype="multipart/form-data">
        <div class="grid">
          <div>
            <label for="student_id">學號（可選）</label>
            <input id="student_id" name="student_id" placeholder="s111111" />
          </div>
          <div>
            <label for="required_credits">畢業所需學分</label>
            <input
              id="required_credits"
              name="required_credits"
              type="number"
              value="128"
              min="1"
              required
            />
          </div>

          <div class="full">
            <label for="required_courses"
              >必修課號清單（可選，逗號或換行分隔）</label
            >
            <textarea
              id="required_courses"
              name="required_courses"
              placeholder="IM1010, IM2030"
            ></textarea>
          </div>

          <div>
            <label for="transcript_file">成績單 CSV（必填）</label>
            <input
              id="transcript_file"
              name="transcript_file"
              type="file"
              accept=".csv"
              required
            />
          </div>
          <div>
            <label for="transfer_file">抵免 CSV（可選）</label>
            <input
              id="transfer_file"
              name="transfer_file"
              type="file"
              accept=".csv"
            />
          </div>
        </div>

        <button type="submit">開始審查</button>
      </form>

      <div id="result" class="result" style="display: none"></div>
      <pre id="raw" style="display: none"></pre>
    </div>

    <script>
      const form = document.getElementById("auditForm");
      const resultEl = document.getElementById("result");
      const rawEl = document.getElementById("raw");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        resultEl.style.display = "none";
        rawEl.style.display = "none";
        resultEl.className = "result";
        resultEl.textContent = "審查中...";
        resultEl.style.display = "block";

        const formData = new FormData(form);

        try {
          const response = await fetch("/api/v1/manual/audit", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "審查失敗");
          }

          const summary = data.summary || {};
          const missingCourses =
            (data.missing_required_courses || []).join(", ") || "無";

          resultEl.classList.add(data.passed ? "ok" : "no");
          resultEl.innerHTML = `
            <strong>${data.passed ? "✅ 審查通過" : "❌ 尚未通過"}</strong><br>
            已修學分：${summary.completed_credits} / 需求學分：${summary.required_credits}<br>
            尚缺學分：${summary.missing_credits}<br>
            未完成必修課號：${missingCourses}
          `;

          rawEl.textContent = JSON.stringify(data, null, 2);
          rawEl.style.display = "block";
        } catch (error) {
          resultEl.classList.add("no");
          resultEl.textContent = `錯誤：${error.message}`;
        }
      });
    </script>
  </body>
</html>
